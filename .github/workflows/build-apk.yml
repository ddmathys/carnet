name: Build APK

# Lancement manuel (onglet Actions → Build APK → Run workflow)
# ou automatique à chaque push sur master.
on:
  workflow_dispatch:
  push:
    branches: [ master ]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout du code
        uses: actions/checkout@v4

      # Fichiers de config Firebase (gitignorés) réinjectés depuis les secrets.
      - name: Restaurer google-services.json
        run: |
          mkdir -p android/app
          echo "${{ secrets.GOOGLE_SERVICES_JSON }}" | base64 -d > android/app/google-services.json

      - name: Restaurer firebase_options.dart
        run: |
          echo "${{ secrets.FIREBASE_OPTIONS_DART }}" | base64 -d > lib/firebase_options.dart

      - name: Installer Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Installer Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable

      # Clé de signature fixe (keystore PKCS12) injectée depuis les secrets.
      - name: Restaurer le keystore de signature
        run: echo "${{ secrets.ANDROID_KEYSTORE_BASE64 }}" | base64 -d > "$RUNNER_TEMP/carnet-release.p12"

      - name: Dépendances
        run: flutter pub get

      - name: Build APK release (signé)
        run: flutter build apk --release
        env:
          ANDROID_KEYSTORE_PATH: ${{ runner.temp }}/carnet-release.p12
          ANDROID_KEYSTORE_PASSWORD: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
          ANDROID_KEY_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS }}

      - name: Publier l'APK
        uses: actions/upload-artifact@v4
        with:
          name: carnet-apk
          path: build/app/outputs/flutter-apk/app-release.apk
          retention-days: 30
