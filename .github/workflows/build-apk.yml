name: Build APK

# Lancement manuel (onglet Actions → Build APK → Run workflow)
# ou automatique à chaque push sur master.
on:
  workflow_dispatch:
  push:
    branches: [ master ]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout du code
        uses: actions/checkout@v4

      # Fichiers de config Firebase (gitignorés) réinjectés depuis les secrets.
      - name: Restaurer google-services.json
        run: |
          mkdir -p android/app
          echo "${{ secrets.GOOGLE_SERVICES_JSON }}" | base64 -d > android/app/google-services.json

      - name: Restaurer firebase_options.dart
        run: |
          echo "${{ secrets.FIREBASE_OPTIONS_DART }}" | base64 -d > lib/firebase_options.dart

      - name: Installer Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Installer Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable

      - name: Dépendances
        run: flutter pub get

      - name: Build APK release
        run: flutter build apk --release

      # SHA-1 de la clé de signature — à enregistrer dans Firebase
      # (Authentication → Sign-in method) pour que Google Sign-In marche.
      - name: Afficher le SHA-1 de signature
        run: |
          keytool -list -v \
            -keystore ~/.android/debug.keystore \
            -alias androiddebugkey \
            -storepass android -keypass android 2>/dev/null \
            | grep -A1 "SHA1" || echo "keystore debug non trouvé"

      - name: Publier l'APK
        uses: actions/upload-artifact@v4
        with:
          name: carnet-apk
          path: build/app/outputs/flutter-apk/app-release.apk
          retention-days: 30
